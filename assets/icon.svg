<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="45%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="28%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Fond -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="256" fill="url(#shine)"/>

  <!-- ═══ FLÈCHE 1 : arc supérieur blanc (Tel→PC) ═══
       Arc de -210° à 30° (240° d'arc), pointe à droite-bas
       Dessiné comme UN seul tracé fermé : bord ext > bord int > pointe -->
  <!-- Rayon ext=210, int=172, épaisseur=38 -->
  <path d="
    M 62 198
    A 210 210 0 1 1 420 338
    L 386 376
    A 172 172 0 1 0 96 228
    Z"
    fill="white" opacity="0.96"/>

  <!-- ═══ FLÈCHE 2 : arc inférieur semi-transparent (PC→Tel) ═══
       Arc retour plus petit, pointe à gauche -->
  <path d="
    M 416 296
    A 170 100 10 0 1 134 322
    L 108 290
    A 138 78 10 0 0 390 264
    Z"
    fill="rgba(255,255,255,0.45)"/>

  <!-- ═══ SMARTPHONE centré ═══ -->
  <!-- Corps -->
  <rect x="206" y="170" width="100" height="172" rx="17" fill="white" opacity="0.97"/>
  <!-- Reflet gauche -->
  <rect x="206" y="170" width="32" height="172" rx="17" fill="rgba(255,255,255,0.18)"/>
  <!-- Écran -->
  <rect x="218" y="185" width="76" height="132" rx="9" fill="#064e3b"/>
  <!-- Encoche -->
  <rect x="236" y="175" width="40" height="6" rx="3" fill="#d1d5db"/>
  <!-- Bouton home -->
  <circle cx="256" cy="330" r="9" fill="#d1d5db"/>

  <!-- Mini sync sur écran -->
  <!-- Arc haut blanc -->
  <path d="M 235 234 A 21 21 0 0 1 277 234 L 268 218 M 277 234 L 283 220" 
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arc bas transparent -->
  <path d="M 277 270 A 21 21 0 0 1 235 270 L 244 286 M 235 270 L 229 284"
        fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>